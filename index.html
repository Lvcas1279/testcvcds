<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SvalStats"/>
<meta name="theme-color" content="#000000"/>
<title>SvalStats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --surface3: #1a1a1a;
    --border: #222222;
    --accent: #FFD344;
    --text: #ffffff;
    --text2: #888888;
    --text3: #555555;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100dvh; overflow: hidden; background: var(--bg); }
  body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }

/* HEADER */
.header { padding: calc(45px + env(safe-area-inset-top)) 20px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
.header-date { font-size: 12px; color: var(--text2); text-align: right; white-space: pre-line; }

/* SCROLL AREA */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.scroll-area::-webkit-scrollbar { display: none; }

/* DAY TABS */
.day-tabs { display: flex; gap: 8px; padding: 16px 20px; overflow-x: auto; flex-shrink: 0; }
.day-tab { flex-shrink: 0; padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; background: var(--surface2); color: var(--text2); cursor: pointer; border: 1.5px solid transparent; white-space: nowrap; }
.day-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* VIEWS */
.view { display: none; padding: 0 20px 140px; }
.view.active { display: block; }

.muscle-section { margin-bottom: 28px; }
.muscle-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--text3); margin-bottom: 12px; padding-left: 2px; }

/* EXERCISE CARD */
.exercise-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
.exercise-card.expanded { border-color: var(--accent); }
.exercise-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 14px; }
.exercise-info { flex: 1; min-width: 0; }
.exercise-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 3px; }

.pr-badge { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent); background: rgba(255, 208, 96, 0.1); padding: 3px 8px; border-radius: 100px; }
.current-weight { font-size: 18px; font-weight: 600; color: var(--accent); }

/* SERIES TABLE */
.series-row { display: grid; grid-template-columns: 40px 1fr 1fr 40px; gap: 6px; margin-bottom: 6px; align-items: center; }
.series-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 8px; color: var(--text); text-align: center; width: 100%; font-family: inherit; font-size: 15px; }
.series-done-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--surface3); border: none; color: var(--text3); display: flex; align-items: center; justify-content: center; }
.series-done-btn.done { background: var(--accent); color: #000; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-top: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); z-index: 200; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; color: var(--text3); cursor: pointer; }
.nav-icon { width: 22px; height: 22px; }
.nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; }
.nav-item.active { color: var(--accent); }

/* EDITOR STYLES */
.editor-card { background: var(--surface2); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
.editor-input { background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: #fff; width: 100%; margin-bottom: 10px; }
.btn-add { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: 700; width: 100%; margin-top: 10px; }
.btn-del { color: #ff4444; background: none; border: none; font-size: 12px; }

.graph-container { height: 160px; margin: 15px 0; background: var(--surface2); border-radius: 12px; padding: 10px; border: 1px solid var(--border); }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none;}
.toast.show { opacity: 1; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; padding: 24px 20px calc(30px + env(safe-area-inset-bottom)); max-width: 430px; margin: 0 auto; }

/* WHEEL PICKER STYLES */
.picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 600; display: none; align-items: flex-end; }
.picker-overlay.open { display: flex; }
.picker-modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; margin: 0 auto; padding: 20px 20px calc(30px + env(safe-area-inset-bottom)); position: relative; }
.picker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.picker-labels { display: flex; justify-content: space-around; margin-bottom: 5px; color: var(--text3); font-size: 12px; font-weight: bold; }
.picker-wheels { display: flex; justify-content: space-between; height: 180px; position: relative; overflow: hidden; background: var(--surface2); border-radius: 12px; border: 1px solid var(--border); }
.picker-wheel { flex: 1; overflow-y: auto; scroll-snap-type: y mandatory; text-align: center; scrollbar-width: none; position: relative; z-index: 2; }
.picker-wheel::-webkit-scrollbar { display: none; }
.picker-item { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 22px; scroll-snap-align: center; color: var(--text); }
.picker-highlight { position: absolute; top: 60px; left: 0; right: 0; height: 60px; border-top: 1.5px solid var(--accent); border-bottom: 1.5px solid var(--accent); pointer-events: none; background: rgba(255, 211, 68, 0.05); z-index: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">SvalStats</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="day-tabs" id="mainTabs">
  <div class="day-tab active" onclick="switchDay(0)">Den 1</div>
  <div class="day-tab" onclick="switchDay(1)">Den 2</div>
  <div class="day-tab" onclick="switchDay(2)">Den 3</div>
</div>

<div class="scroll-area" id="mainScroll">
  <div id="day-0" class="view active"></div>
  <div id="day-1" class="view"></div>
  <div id="day-2" class="view"></div>
  
  <div id="stats-view" class="view">
    <div class="muscle-label">Rekordy</div>
    <div id="stats-content"></div>
  </div>

  <div id="editor-view" class="view">
    <div class="muscle-label">Editor Tréninku</div>
    <div id="editor-content"></div>
    <button class="btn-add" onclick="resetWorkoutToDefault()" style="background:none; color:var(--text3); border:1px solid var(--text3); margin-top:40px;">Resetovat na původní plán</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" id="nav-workout" onclick="switchNav('workout')">
    <i data-lucide="dumbbell" class="nav-icon"></i>
    <div class="nav-label">TRÉNINK</div>
  </div>
  <div class="nav-item" id="nav-stats" onclick="switchNav('stats')">
    <i data-lucide="bar-chart-3" class="nav-icon"></i>
    <div class="nav-label">REKORDY</div>
  </div>
  <div class="nav-item" id="nav-editor" onclick="switchNav('editor')">
    <i data-lucide="settings" class="nav-icon"></i>
    <div class="nav-label">EDITOR</div>
  </div>
  <a href="spotify://" class="nav-item">
    <i data-lucide="music" class="nav-icon"></i>
    <div class="nav-label">SPOTIFY</div>
  </a>
</div>

<div class="modal-overlay" id="prModal">
  <div class="modal">
    <div class="modal-title" id="modal-title" style="text-align:center; font-family:'Bebas Neue'; font-size:24px; margin-bottom:15px;">Nový rekord</div>
    <input type="number" class="series-input" id="modal-input" style="font-size:32px; height:60px; margin-bottom:15px;" placeholder="0" inputmode="decimal">
    <button class="btn-add" onclick="savePr()">ULOŽIT REKORD</button>
    <button onclick="closePrModal()" style="width:100%; background:none; border:none; color:var(--text2); margin-top:15px;">Zrušit</button>
  </div>
</div>

<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-modal">
    <div class="picker-header">
      <span style="font-weight: 700; font-size: 18px;">Nastavit sérii</span>
      <button onclick="closePicker()" style="color:var(--accent); background:none; border:none; font-weight:700; font-size:16px;">HOTOVO</button>
    </div>
    <div class="picker-labels">
      <div style="flex:1; text-align:center;">KG</div>
      <div style="flex:1; text-align:center;">,KG</div>
      <div style="flex:1; text-align:center;">OPAKOVÁNÍ</div>
    </div>
    <div class="picker-wheels">
      <div class="picker-highlight"></div>
      <div class="picker-wheel" id="wheelKg" onscroll="snapToCenter(this)"></div>
      <div class="picker-wheel" id="wheelDec" onscroll="snapToCenter(this)"></div>
      <div class="picker-wheel" id="wheelReps" onscroll="snapToCenter(this)"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_PLAN = [
  { id: 0, label: "Den 1: Nohy + Biceps", sections: [
    { label: "BICEPS", exercises: [ { id: 'ex1', name:'Preacher curl', sets:4, reps:'8-10' }, { id: 'ex2', name:'Hammer curl', sets:3, reps:'10-12' }, { id: 'ex3', name:'Incline dumbbell curl', sets:3, reps:'10-12' } ] },
    { label: "NOHY", exercises: [ { id: 'ex4', name:'Leg press', sets:4, reps:'12' }, { id: 'ex5', name:'Lying leg curl', sets:3, reps:'10-12' }, { id: 'ex6', name:'Calf raises', sets:3, reps:'20' } ] }
  ]},
  { id: 1, label: "Den 2: Záda + Ramena", sections: [
    { label: "ZÁDA", exercises: [ { id: 'ex7', name:'Lat pulldown', sets:4, reps:'12' }, { id: 'ex8', name:'Cable row', sets:4, reps:'10' }, { id: 'ex9', name:'Hyperextenze', sets:3, reps:'12-15' } ] },
    { label: "RAMENA", exercises: [ { id: 'ex10', name:'Shoulder press', sets:4, reps:'10' }, { id: 'ex11', name:'Arnold press', sets:3, reps:'12' }, { id: 'ex12', name:'Reverse fly', sets:3, reps:'12' } ] }
  ]},
  { id: 2, label: "Den 3: Kozy + Tricák", sections: [
    { label: "KOZY", exercises: [ { id: 'ex13', name:'Bench', sets:4, reps:'12' }, { id: 'ex14', name:'Peck deck', sets:3, reps:'10' }, { id: 'ex15', name:'Incline dumbell press', sets:3, reps:'12-15' } ] },
    { label: "TRICÁK", exercises: [ { id: 'ex16', name:'Overhead DB extension', sets:3, reps:'10' }, { id: 'ex17', name:'Dumbbell kickbacks', sets:3, reps:'12' }, { id: 'ex18', name:'Cable triceps pushdown', sets:4, reps:'12' } ] }
  ]}
];

let workoutPlan = JSON.parse(localStorage.getItem('ss_plan')) || DEFAULT_PLAN;
let state = JSON.parse(localStorage.getItem('ss_state')) || {};
let prData = JSON.parse(localStorage.getItem('ss_pr')) || {};
let videoData = JSON.parse(localStorage.getItem('ss_vid')) || {};
let charts = {};
let statsCharts = {};

function saveAll() {
    localStorage.setItem('ss_plan', JSON.stringify(workoutPlan));
    localStorage.setItem('ss_state', JSON.stringify(state));
    localStorage.setItem('ss_pr', JSON.stringify(prData));
    localStorage.setItem('ss_vid', JSON.stringify(videoData));
}

function renderApp() {
  workoutPlan.forEach(day => {
    const container = document.getElementById('day-' + day.id);
    if(!container) return;
    let html = `<div class="muscle-label" style="font-size:22px; color:var(--accent); margin-bottom:20px;">${day.label}</div>`;
    day.sections.forEach(sec => {
      html += `<div class="muscle-section"><div class="muscle-label">${sec.label}</div>`;
      sec.exercises.forEach(ex => {
        const pr = prData[ex.id] || '—';
        const video = videoData[ex.id] || '';
        const hist = state[ex.id]?.history || [];
        const lastWeight = hist.length > 0 ? hist[hist.length-1].maxWeight : '—';
        
        html += `
          <div id="card-${ex.id}" class="exercise-card" onclick="toggleCard('${ex.id}')">
            <div class="exercise-header">
              <div class="exercise-info">
                <div class="exercise-name">${ex.name}</div>
                <div style="font-size:11px; color:var(--text2)">${ex.sets} série · ${ex.reps} reps</div>
              </div>
              <div class="exercise-right" style="text-align:right">
                <div class="pr-badge"><i data-lucide="trophy" style="width:12px"></i> <span>${pr}</span></div>
                <div class="current-weight">${lastWeight} <span style="font-size:11px; color:var(--text2)">kg</span></div>
              </div>
            </div>
            <div class="exercise-body" id="body-${ex.id}" style="display:none; padding:15px; border-top:1px solid var(--border)">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                <div style="background:var(--surface2); padding:10px; border-radius:8px; position:relative;">
                    <div style="font-size:10px; color:var(--text2)">REKORD</div>
                    <div style="font-size:18px; font-weight:700; color:var(--accent)">${pr} kg</div>
                    <i data-lucide="edit-2" style="position:absolute; right:10px; top:10px; width:14px; color:var(--accent)" onclick="openPrModal('${ex.id}','${ex.name}');event.stopPropagation()"></i>
                </div>
                <div style="background:var(--surface2); padding:10px; border-radius:8px;">
                    <div style="font-size:10px; color:var(--text2)">VIDEO</div>
                    <input type="url" placeholder="URL" value="${video}" onchange="videoData['${ex.id}']=this.value;saveAll();" onclick="event.stopPropagation()" 
                           style="background:none; border:none; color:var(--text); width:100%; font-size:12px; outline:none;">
                </div>
              </div>
              <div class="graph-container" id="graph-cont-${ex.id}"><canvas id="chart-${ex.id}"></canvas></div>
              <div id="rows-${ex.id}"></div>
            </div>
          </div>`;
      });
      html += `</div>`;
    });
    html += `<button class="btn-add" onclick="finishWorkout(${day.id})">DOKONČIT TRÉNINK</button>`;
    container.innerHTML = html;
  });
  lucide.createIcons();
}

function buildRows(id) {
  const container = document.getElementById('rows-'+id);
  const findEx = () => {
      for(let d of workoutPlan) for(let s of d.sections) for(let e of s.exercises) if(e.id === id) return e;
  }
  const ex = findEx();
  if (!state[id]) state[id] = { rows: [], history: [] };
  if (state[id].rows.length === 0) {
      state[id].rows = Array.from({length: parseInt(ex.sets)}, () => ({weight: '', reps: '', done: false}));
  }
  
  container.innerHTML = `<div style="display:grid; grid-template-columns:40px 1fr 1fr 40px; font-size:10px; color:var(--text3); margin-bottom:5px; text-align:center;"><span>SET</span><span>KG</span><span>REPS</span><span></span></div>`;
  
  state[id].rows.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'series-row';
    div.innerHTML = `
      <span style="text-align:center; color:var(--text2); font-size:13px;">${i+1}</span>
      <div class="series-input" style="cursor:pointer; display:flex; justify-content:center; align-items:center;" onclick="openPicker('${id}', ${i}); event.stopPropagation()">
        ${row.weight !== '' ? row.weight : '-'}
      </div>
      <div class="series-input" style="cursor:pointer; display:flex; justify-content:center; align-items:center;" onclick="openPicker('${id}', ${i}); event.stopPropagation()">
        ${row.reps !== '' ? row.reps : '-'}
      </div>
      <button class="series-done-btn ${row.done?'done':''}" onclick="state['${id}'].rows[${i}].done=!state['${id}'].rows[${i}].done;saveAll();buildRows('${id}');event.stopPropagation()">
        <i data-lucide="${row.done?'check':'circle'}" style="width:16px"></i>
      </button>`;
    container.appendChild(div);
  });
  lucide.createIcons();
}

// ---------------- WHEEL PICKER LOGIKA ----------------
let activePicker = null;

function populateWheels() {
    const pad = '<div class="picker-item"></div>';
    
    // KG Kolečko (0-300)
    let kgHtml = pad;
    for(let i=0; i<=300; i++) kgHtml += `<div class="picker-item" data-val="${i}">${i}</div>`;
    document.getElementById('wheelKg').innerHTML = kgHtml + pad;

    // Desetinná místa (.00, .25, .50, .75)
    let decHtml = pad;
    ['00', '25', '50', '75'].forEach(v => decHtml += `<div class="picker-item" data-val="${v}">.${v}</div>`);
    document.getElementById('wheelDec').innerHTML = decHtml + pad;

    // Opakování (0-100)
    let repsHtml = pad;
    for(let i=0; i<=100; i++) repsHtml += `<div class="picker-item" data-val="${i}">${i}</div>`;
    document.getElementById('wheelReps').innerHTML = repsHtml + pad;
}

function openPicker(exId, rowIndex) {
    activePicker = { exId, rowIndex };
    const row = state[exId].rows[rowIndex];
    
    if (document.getElementById('wheelKg').children.length === 0) {
        populateWheels();
    }

    document.getElementById('pickerOverlay').classList.add('open');

    // Nalezení aktuálních hodnot
    const currentWeight = parseFloat(row.weight || 0);
    const kgMain = Math.floor(currentWeight);
    let kgDec = ((currentWeight % 1) * 100).toFixed(0);
    if(kgDec === '0') kgDec = '00';
    const cReps = parseInt(row.reps || 0);

    // Vynucení odscrollování po zobrazení modalního okna
    setTimeout(() => {
        const centerItem = (wheelId, val) => {
            const wheel = document.getElementById(wheelId);
            const el = wheel.querySelector(`[data-val="${val}"]`);
            if(el) {
                el.scrollIntoView({block: 'center', inline: 'nearest', behavior: 'instant'});
            }
        };
        centerItem('wheelKg', kgMain);
        centerItem('wheelDec', kgDec);
        centerItem('wheelReps', cReps);
    }, 10);
}

function closePicker() {
    if(!activePicker) return;

    const getVal = (id) => {
        const w = document.getElementById(id);
        const center = w.scrollTop + w.clientHeight / 2;
        const items = w.querySelectorAll('.picker-item[data-val]');
        let closest = items[0];
        let minDist = Infinity;
        items.forEach(i => {
            const dist = Math.abs(i.offsetTop + i.offsetHeight/2 - w.scrollTop - w.clientHeight/2);
            if(dist < minDist) { minDist = dist; closest = i; }
        });
        return closest ? closest.dataset.val : "0";
    };

    const kg = getVal('wheelKg');
    const dec = getVal('wheelDec');
    const reps = getVal('wheelReps');

    const finalWeight = dec === '00' ? kg : `${kg}.${dec}`;
    
    state[activePicker.exId].rows[activePicker.rowIndex].weight = finalWeight;
    state[activePicker.exId].rows[activePicker.rowIndex].reps = reps;
    
    saveAll();
    buildRows(activePicker.exId); // Překreslí pouze řádky - KARTA ZŮSTANE OTEVŘENÁ
    document.getElementById('pickerOverlay').classList.remove('open');
    activePicker = null;
}

// Jemné do-centrování při scrollování (optional UX)
let scrollTimeout;
function snapToCenter(wheel) {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        const center = wheel.scrollTop + wheel.clientHeight / 2;
        const items = wheel.querySelectorAll('.picker-item[data-val]');
        let closest = items[0];
        let minDist = Infinity;
        items.forEach(i => {
            const dist = Math.abs(i.offsetTop + i.offsetHeight/2 - wheel.scrollTop - wheel.clientHeight/2);
            if(dist < minDist) { minDist = dist; closest = i; }
        });
        if(closest) closest.scrollIntoView({block: 'center', behavior: 'smooth'});
    }, 150);
}
// --------------------------------------------------

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const card = document.getElementById('card-'+id);
  const isOpen = body.style.display === 'block';
  document.querySelectorAll('.exercise-body').forEach(b => b.style.display = 'none');
  document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('expanded'));
  if(!isOpen) {
      body.style.display = 'block';
      card.classList.add('expanded');
      buildRows(id);
      renderChart(id);
  }
}

function renderEditor() {
    const cont = document.getElementById('editor-content');
    let html = '';
    workoutPlan.forEach((day, dIdx) => {
        html += `<div class="editor-card">
            <input class="editor-input" style="font-weight:700; color:var(--accent)" value="${day.label}" onchange="workoutPlan[${dIdx}].label=this.value;saveAll()">
            ${day.sections.map((sec, sIdx) => `
                <div style="margin:10px 0 10px 10px; border-left:1px solid var(--border); padding-left:10px;">
                    <input class="editor-input" value="${sec.label}" onchange="workoutPlan[${dIdx}].sections[${sIdx}].label=this.value;saveAll()">
                    ${sec.exercises.map((ex, eIdx) => `
                        <div style="display:flex; gap:5px; margin-bottom:5px;">
                            <input class="editor-input" style="flex:2" value="${ex.name}" onchange="workoutPlan[${dIdx}].sections[${sIdx}].exercises[${eIdx}].name=this.value;saveAll()">
                            <input class="editor-input" style="flex:1" value="${ex.sets}" onchange="workoutPlan[${dIdx}].sections[${sIdx}].exercises[${eIdx}].sets=this.value;saveAll()">
                            <button class="btn-del" onclick="removeEx(${dIdx},${sIdx},${eIdx})">✕</button>
                        </div>
                    `).join('')}
                    <button class="btn-add" style="font-size:11px; padding:5px" onclick="addEx(${dIdx},${sIdx})">+ Cvik</button>
                </div>
            `).join('')}
        </div>`;
    });
    cont.innerHTML = html;
}

function addEx(d, s) {
    workoutPlan[d].sections[s].exercises.push({ id: 'ex'+Date.now(), name: 'Nový cvik', sets: 3, reps: '12' });
    saveAll(); renderEditor();
}
function removeEx(d, s, e) {
    workoutPlan[d].sections[s].exercises.splice(e, 1);
    saveAll(); renderEditor();
}
function resetWorkoutToDefault() {
    if(confirm('Opravdu resetovat celý plán?')) { workoutPlan = DEFAULT_PLAN; saveAll(); location.reload(); }
}

function finishWorkout(dayId) {
    const day = workoutPlan.find(d => d.id === dayId);
    day.sections.forEach(sec => sec.exercises.forEach(ex => {
        const s = state[ex.id];
        if(s && s.rows.some(r => r.done)) {
            const max = Math.max(...s.rows.filter(r => r.done).map(r => parseFloat(r.weight) || 0));
            s.history.push({ date: new Date().toISOString(), maxWeight: max });
            s.rows = []; 
        }
    }));
    saveAll(); renderApp(); showToast("Trénink uložen! 💪");
}

function switchNav(tab) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('nav-'+tab).classList.add('active');
    document.getElementById('mainTabs').style.display = tab === 'workout' ? 'flex' : 'none';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    if(tab === 'workout') {
        const activeTabIdx = Array.from(document.querySelectorAll('.day-tab')).findIndex(t => t.classList.contains('active'));
        document.getElementById('day-'+activeTabIdx).classList.add('active');
    } else {
        document.getElementById(tab+'-view').classList.add('active');
        if(tab === 'editor') renderEditor();
        if(tab === 'stats') buildStats();
    }
}

function switchDay(d) {
    document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.day-tabs .day-tab')[d].classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('day-'+d).classList.add('active');
}

function renderChart(id) {
  const ctx = document.getElementById('chart-'+id);
  const history = state[id]?.history || [];
  if(history.length < 2) { document.getElementById('graph-cont-'+id).style.display = 'none'; return; }
  document.getElementById('graph-cont-'+id).style.display = 'block';
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.slice(-6).map(h => new Date(h.date).toLocaleDateString('cs-CZ', {day:'numeric', month:'numeric'})),
      datasets: [{ data: history.slice(-6).map(h => h.maxWeight), borderColor: '#FFD344', tension: 0.3, fill: false }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#222' }, ticks: { color: '#666', font: {size:10} } } } }
  });
}

// ---------------- AKTUALIZOVANÁ SEKCE REKORDŮ (STATS) ----------------
function buildStats() {
    const content = document.getElementById('stats-content');
    let html = '';
    workoutPlan.forEach(d => d.sections.forEach(s => s.exercises.forEach(ex => {
        const pr = prData[ex.id] || '—';
        html += `
        <div style="background:var(--surface); border-radius:12px; margin-bottom:10px; border:1px solid var(--border); overflow:hidden;">
            <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleStatsGraph('${ex.id}')">
                <div><div style="font-weight:600">${ex.name}</div><div style="font-size:10px; color:var(--text3)">${s.label}</div></div>
                <div style="color:var(--accent); font-weight:700; font-size:18px;">${pr} kg</div>
            </div>
            <div id="stats-body-${ex.id}" style="display:none; padding:15px; border-top:1px solid var(--border);">
                <div class="graph-container" style="margin:0;"><canvas id="stats-chart-${ex.id}"></canvas></div>
            </div>
        </div>`;
    })));
    content.innerHTML = html;
}

function toggleStatsGraph(id) {
    const body = document.getElementById('stats-body-'+id);
    if(body.style.display === 'block') {
        body.style.display = 'none';
    } else {
        body.style.display = 'block';
        renderStatsChart(id);
    }
}

function renderStatsChart(id) {
    const ctx = document.getElementById('stats-chart-'+id);
    const history = state[id]?.history || [];
    
    if(history.length < 2) { 
        ctx.parentElement.innerHTML = '<div style="text-align:center; color:var(--text3); font-size:12px; margin-top:60px;">Málo dat pro graf (nutné dokončit min. 2 tréninky)</div>'; 
        return; 
    }
    
    if(statsCharts[id]) statsCharts[id].destroy();
    statsCharts[id] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: history.map(h => new Date(h.date).toLocaleDateString('cs-CZ', {day:'numeric', month:'numeric'})),
            datasets: [{ data: history.map(h => h.maxWeight), borderColor: '#FFD344', tension: 0.3, fill: false }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { legend: { display: false } }, 
            scales: { 
                x: { ticks: { color: '#666', font: {size:10} } }, 
                y: { grid: { color: '#222' }, ticks: { color: '#666', font: {size:10} } } 
            } 
        }
    });
}
// ----------------------------------------------------------------------

let activePrId = null;
function openPrModal(id, name) { activePrId = id; document.getElementById('modal-title').innerText = name; document.getElementById('prModal').classList.add('open'); }
function closePrModal() { document.getElementById('prModal').classList.remove('open'); }
function savePr() { 
    prData[activePrId] = document.getElementById('modal-input').value; 
    saveAll(); closePrModal(); renderApp(); 
}

function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
function setDate() { 
    const n = new Date(); 
    const d = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota']; 
    const m = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince']; 
    document.getElementById('headerDate').innerText = d[n.getDay()] + '\n' + n.getDate() + '. ' + m[n.getMonth()]; 
}

setDate();
renderApp();
</script>
</body>
