<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SvalStats"/>
<title>SvalStats</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #050505;
  --surface: rgba(20, 20, 20, 0.7);
  --surface2: rgba(30, 30, 30, 0.6);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #FFD344;
  --accent-soft: rgba(255, 211, 68, 0.1);
  --text: #ffffff;
  --text2: #a0a0a0;
  --text3: #666666;
  --radius: 24px;
}

[data-theme="light"] {
  --bg: #f4f4f0;
  --surface: rgba(255, 255, 255, 0.8);
  --surface2: #e8e8e0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text2: #555555;
  --text3: #999999;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  background: radial-gradient(circle at 0% 0%, rgba(255, 211, 68, 0.05) 0%, transparent 40%), var(--bg);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-width: 500px;
  margin: 0 auto;
}

/* HEADER */
.header {
  padding: calc(env(safe-area-inset-top) + 15px) 20px 15px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.logo { font-size: 24px; font-weight: 900; color: var(--accent); }
.logo span { color: var(--text); }

/* CONTENT */
.scroll-area { flex: 1; overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
.scroll-area::-webkit-scrollbar { display: none; }
.view { display: none; padding: 0 20px; }
.view.active { display: block; }

.section-label { 
  font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--text3);
  text-transform: uppercase; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* CARDS */
.ex-card { 
  background: var(--surface); border: 1px solid var(--border); 
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  backdrop-filter: blur(15px);
}
.ex-hdr { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.ex-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }

/* SETS */
.set-row { display: grid; grid-template-columns: 30px 1fr 1fr 45px; gap: 10px; margin-top: 10px; align-items: center; }
.set-input { 
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    height: 45px; border-radius: 12px; text-align: center; font-weight: 600; font-family: inherit;
}
.btn-done { 
    height: 45px; border-radius: 12px; border: none; background: var(--surface2); 
    color: var(--text3); font-weight: bold; cursor: pointer;
}
.btn-done.active { background: var(--accent); color: #000; }

/* NAV */
.bot-nav { 
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px;
  background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-top: 1px solid var(--border);
  display: flex; padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
}
.nav-it { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text3); cursor: pointer; }
.nav-it.active { color: var(--accent); }
.nav-lbl { font-size: 10px; font-weight: 700; }

/* UTILS */
.btn-primary { 
    width: 100%; padding: 16px; border-radius: 18px; background: var(--accent); 
    color: #000; border: none; font-weight: 800; cursor: pointer; margin-top: 10px;
}
.video-link { color: var(--accent); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.chart-container { background: var(--surface2); border-radius: 15px; padding: 10px; margin-bottom: 20px; height: 200px; }
.day-tabs { display: flex; gap: 8px; padding: 15px 20px; overflow-x: auto; }
.day-tab { padding: 10px 20px; background: var(--surface2); border-radius: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); }
.day-tab.active { background: var(--accent); color: #000; }

/* EDITOR STYLES */
.editor-item { background: var(--surface2); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
.editor-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 8px; margin-bottom: 5px; }
</style>
</head>
<body data-theme="dark">

<div class="header">
  <div class="logo">Sval<span>Stats</span></div>
  <div id="hdrDate" style="font-size: 12px; color: var(--text2)"></div>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="scroll-area">
  <div id="workout-view" class="view active">
    <div id="exercise-list"></div>
    <button class="btn-primary" style="margin: 20px 0" onclick="finishWorkout()">DOKONČIT TRÉNINK</button>
  </div>

  <div id="stats-view" class="view">
    <div class="section-label">Historie a progres</div>
    <div id="stats-container"></div>
  </div>

  <div id="editor-view" class="view">
    <div class="section-label">Upravit tréninkový plán</div>
    <div id="editor-container"></div>
    <button class="btn-primary" onclick="addNewDay()">+ Přidat nový den</button>
  </div>

  <div id="settings-view" class="view">
    <div class="section-label">Vzhled</div>
    <button class="btn-primary" style="background: var(--surface2); color: var(--text)" onclick="toggleTheme()">Přepnout Tmavý / Světlý režim</button>
    
    <div class="section-label">Data a export</div>
    <p style="font-size: 12px; color: var(--text2); margin-bottom: 10px;">Exportuj data pro analýzu tvou AI.</p>
    <button class="btn-primary" onclick="exportData()">Exportovat data (JSON)</button>
    <button class="btn-primary" style="background: #ff4444; color: white" onclick="resetData()">Smazat všechna data</button>
  </div>
</div>

<nav class="bot-nav">
  <div class="nav-it active" onclick="switchNav('workout', this)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg><div class="nav-lbl">Trénink</div></div>
  <div class="nav-it" onclick="switchNav('stats', this)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><div class="nav-lbl">Rekordy</div></div>
  <div class="nav-it" onclick="switchNav('editor', this)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><div class="nav-lbl">Editor</div></div>
  <div class="nav-it" onclick="switchNav('settings', this)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><div class="nav-lbl">Nastavení</div></div>
</nav>

<script>
// --- DATA ---
let plan = JSON.parse(localStorage.getItem('ss_plan')) || [
    { label: "Den 1", exercises: [{ id: "ex_1", name: "Benchpress", sets: 3, reps: "10", video: "https://youtube.com" }] }
];
let history = JSON.parse(localStorage.getItem('ss_history')) || {}; 
let curDayIdx = 0;

function save() {
    localStorage.setItem('ss_plan', JSON.stringify(plan));
    localStorage.setItem('ss_history', JSON.stringify(history));
}

// --- NAVIGATION ---
function switchNav(viewId, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId + '-view').classList.add('active');
    document.querySelectorAll('.nav-it').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    
    if (viewId === 'stats') renderStats();
    if (viewId === 'editor') renderEditor();
    if (viewId === 'workout') renderWorkout();
}

// --- WORKOUT LOGIC ---
function renderWorkout() {
    const tabs = document.getElementById('dayTabs');
    tabs.innerHTML = plan.map((day, i) => `
        <div class="day-tab ${i === curDayIdx ? 'active' : ''}" onclick="curDayIdx=${i}; renderWorkout()">${day.label}</div>
    `).join('');

    const list = document.getElementById('exercise-list');
    const day = plan[curDayIdx];
    list.innerHTML = `<div class="section-label">${day.label}</div>`;
    
    day.exercises.forEach(ex => {
        list.innerHTML += `
            <div class="ex-card">
                <div class="ex-hdr" onclick="toggleCard('${ex.id}')">
                    <div>
                        <div style="font-weight:800">${ex.name}</div>
                        <div style="font-size:12px; color:var(--text2)">${ex.sets} série po ${ex.reps}</div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="ex-body" id="body-${ex.id}">
                    <div style="margin-bottom: 15px">
                        ${ex.video ? `<a href="${ex.video}" target="_blank" class="video-link">▶ Video návod</a>` : '<span style="font-size:12px;color:var(--text3)">Video není k dispozici</span>'}
                    </div>
                    <div id="sets-${ex.id}">
                        ${Array.from({length: ex.sets}).map((_, i) => `
                            <div class="set-row">
                                <span style="font-size:12px; color:var(--text3)">${i+1}.</span>
                                <input type="number" class="set-input" placeholder="kg" id="w-${ex.id}-${i}">
                                <input type="number" class="set-input" placeholder="reps" id="r-${ex.id}-${i}">
                                <button class="btn-done" onclick="this.classList.toggle('active')">✔</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    });
}

function toggleCard(id) {
    const b = document.getElementById('body-' + id);
    b.style.display = b.style.display === 'block' ? 'none' : 'block';
}

function finishWorkout() {
    const day = plan[curDayIdx];
    const date = new Date().toLocaleDateString('cs-CZ');
    
    day.exercises.forEach(ex => {
        let maxWeight = 0;
        for(let i=0; i<ex.sets; i++) {
            const w = parseFloat(document.getElementById(`w-${ex.id}-${i}`).value);
            if (w > maxWeight) maxWeight = w;
        }
        
        if (maxWeight > 0) {
            if (!history[ex.name]) history[ex.name] = [];
            history[ex.name].push({ date, weight: maxWeight });
        }
    });
    
    save();
    alert('Trénink uložen do historie!');
}

// --- STATS / CHART LOGIC ---
function renderStats() {
    const cont = document.getElementById('stats-container');
    cont.innerHTML = '';
    
    const exercises = Object.keys(history);
    if (exercises.length === 0) {
        cont.innerHTML = '<p style="text-align:center; padding:40px; color:var(--text3)">Zatím nemáš žádná data v historii.</p>';
        return;
    }

    exercises.forEach(name => {
        const data = history[name];
        const canvasId = 'chart-' + name.replace(/\s+/g, '-');
        cont.innerHTML += `
            <div style="margin-top:20px; font-weight:800">${name}</div>
            <div class="chart-container">
                <canvas id="${canvasId}"></canvas>
            </div>
        `;
        
        setTimeout(() => {
            new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'Váha (kg)',
                        data: data.map(d => d.weight),
                        borderColor: '#FFD344',
                        backgroundColor: 'rgba(255, 211, 68, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666' } },
                        x: { grid: { display: false }, ticks: { color: '#666' } }
                    }
                }
            });
        }, 50);
    });
}

// --- EDITOR LOGIC ---
function renderEditor() {
    const cont = document.getElementById('editor-container');
    cont.innerHTML = '';
    
    plan.forEach((day, dIdx) => {
        let exHtml = day.exercises.map((ex, eIdx) => `
            <div class="editor-item">
                <input class="editor-input" value="${ex.name}" onchange="updateEx(${dIdx}, ${eIdx}, 'name', this.value)" placeholder="Název cviku">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <input class="editor-input" type="number" value="${ex.sets}" onchange="updateEx(${dIdx}, ${eIdx}, 'sets', this.value)" placeholder="Série">
                    <input class="editor-input" value="${ex.reps}" onchange="updateEx(${dIdx}, ${eIdx}, 'reps', this.value)" placeholder="Opakování">
                </div>
                <input class="editor-input" value="${ex.video || ''}" onchange="updateEx(${dIdx}, ${eIdx}, 'video', this.value)" placeholder="Odkaz na video (URL)">
                <button onclick="removeEx(${dIdx}, ${eIdx})" style="background:none; border:none; color:#ff4444; font-size:11px; font-weight:bold; cursor:pointer">SMAZAT CVIK</button>
            </div>
        `).join('');

        cont.innerHTML += `
            <div style="background:var(--surface); padding:15px; border-radius:20px; margin-bottom:20px; border:1px solid var(--border)">
                <input class="editor-input" style="font-weight:bold; font-size:16px" value="${day.label}" onchange="plan[${dIdx}].label=this.value; save()">
                ${exHtml}
                <button class="btn-primary" style="background:var(--surface2); color:var(--text); font-size:12px; padding:10px" onclick="addEx(${dIdx})">+ Přidat cvik</button>
                <button onclick="removeDay(${dIdx})" style="background:none; border:none; color:var(--text3); font-size:10px; width:100%; margin-top:10px; cursor:pointer">SMAZAT CELÝ DEN</button>
            </div>
        `;
    });
}

function updateEx(dIdx, eIdx, key, val) {
    plan[dIdx].exercises[eIdx][key] = val;
    save();
}

function addEx(dIdx) {
    plan[dIdx].exercises.push({ id: 'ex_' + Date.now(), name: "Nový cvik", sets: 3, reps: "10", video: "" });
    save();
    renderEditor();
}

function removeEx(dIdx, eIdx) {
    plan[dIdx].exercises.splice(eIdx, 1);
    save();
    renderEditor();
}

function addNewDay() {
    plan.push({ label: "Nový den", exercises: [] });
    save();
    renderEditor();
}

function removeDay(idx) {
    if(confirm('Opravdu smazat celý den?')) {
        plan.splice(idx, 1);
        save();
        renderEditor();
    }
}

// --- SETTINGS & EXPORT ---
function toggleTheme() {
    const b = document.body;
    const isDark = b.getAttribute('data-theme') === 'dark';
    b.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

function exportData() {
    const dataStr = JSON.stringify({ plan, history }, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "svalstats_export.json";
    a.click();
}

function resetData() {
    if(confirm('Opravdu smazat všechna data? Tato akce je nevratná.')) {
        localStorage.clear();
        location.reload();
    }
}

// --- INIT ---
document.getElementById('hdrDate').innerText = new Date().toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' });
renderWorkout();
</script>

</body>
</html>
