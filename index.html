<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SvalStats"/>
<meta name="theme-color" content="#000000"/>
<title>SvalStats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --surface3: #1a1a1a;
    --border: #222222;
    --accent: #FFD344;
    --text: #ffffff;
    --text2: #888888;
    --text3: #555555;
    --radius: 20px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    height: 100%; width: 100%; overflow: hidden; 
    background: var(--bg); position: fixed;
  }

  body { 
    font-family: 'DM Sans', sans-serif; color: var(--text); 
    display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; 
  }

/* HEADER */
.header { 
    padding: calc(45px + env(safe-area-inset-top)) 20px 16px; 
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; 
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: var(--accent); }
.header-date { font-size: 13px; color: var(--text2); text-align: right; white-space: pre-line; line-height: 1.2; }

/* DAY TABS */
.day-tabs { display: flex; padding: 0 20px 16px; gap: 10px; flex-shrink: 0; }
.day-tab { 
    flex: 1; padding: 14px 0; border-radius: 14px; font-size: 14px; font-weight: 700; 
    background: var(--surface2); color: var(--text2); cursor: pointer; 
    border: 1px solid var(--border); text-align: center; transition: 0.2s;
}
.day-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* SCROLL AREA */
.scroll-area { 
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; padding-bottom: 120px;
}
.scroll-area::-webkit-scrollbar { display: none; }

.view { display: none; padding: 0 20px; }
.view.active { display: block; }

.muscle-label { 
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; 
    letter-spacing: 2px; color: var(--text3); margin: 24px 0 12px; 
}

/* CARDS */
.exercise-card { 
    background: var(--surface); border-radius: var(--radius); 
    border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; 
}
.exercise-card.expanded { border-color: var(--accent); }
.exercise-header { display: flex; align-items: center; padding: 18px 20px; cursor: pointer; gap: 14px; }
.exercise-info { flex: 1; min-width: 0; }
.exercise-name { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }

.pr-badge { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent); background: rgba(255, 211, 68, 0.1); padding: 4px 10px; border-radius: 100px; }
.current-weight { font-size: 20px; font-weight: 700; color: var(--accent); margin-top: 4px; }

/* SERIES ROW */
.series-row { 
    display: grid; grid-template-columns: 40px 1fr 1fr 40px; 
    gap: 12px; margin-bottom: 10px; align-items: center; 
}
.series-input { 
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; 
    padding: 12px 0; color: var(--text); text-align: center; font-size: 16px; font-weight: 600;
}
.series-done-btn { 
    width: 40px; height: 40px; border-radius: 12px; background: var(--surface3); 
    border: none; color: var(--text3); display: flex; align-items: center; justify-content: center; 
}
.series-done-btn.done { background: var(--accent); color: #000; }

/* EDITOR INPUTS */
.editor-group { background: var(--surface); padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; }
.edit-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: white; padding: 10px; margin-bottom: 8px; font-family: inherit; font-size: 14px; }
.edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* BOTTOM NAV */
.bottom-nav { 
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); 
    border-top: 1px solid var(--border); display: flex; padding-top: 12px; 
    padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 1000; 
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; color: var(--text3); cursor: pointer; }
.nav-icon { width: 24px; height: 24px; }
.nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
.nav-item.active { color: var(--accent); }

/* WHEEL PICKER */
.picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: flex-end; }
.picker-overlay.open { display: flex; }
.picker-modal { background: var(--surface); border-radius: 30px 30px 0 0; width: 100%; max-width: 500px; margin: 0 auto; padding: 24px 24px calc(40px + env(safe-area-inset-bottom)); }
.picker-wheels { display: grid; grid-template-columns: 1fr 1fr; height: 200px; position: relative; overflow: hidden; background: var(--surface2); border-radius: 20px; margin-top: 20px; }
.picker-wheel { overflow-y: auto; scroll-snap-type: y mandatory; text-align: center; scrollbar-width: none; }
.picker-wheel::-webkit-scrollbar { display: none; }
.picker-item { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; scroll-snap-align: center; color: var(--text); font-weight: 600; }
.picker-highlight { position: absolute; top: 70px; left: 0; right: 0; height: 60px; border-top: 2px solid var(--accent); border-bottom: 2px solid var(--accent); pointer-events: none; background: rgba(255, 211, 68, 0.05); }

/* BUTTONS & TOAST */
.btn-add { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; font-size: 16px; margin-top: 20px; }
.toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 3000; }
.toast.show { opacity: 1; }
.graph-container { height: 180px; margin: 10px 0; background: var(--surface2); border-radius: 16px; padding: 10px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">SvalStats</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="day-tabs" id="mainTabs">
  <div class="day-tab active" onclick="switchDay(0)">DEN 1</div>
  <div class="day-tab" onclick="switchDay(1)">DEN 2</div>
  <div class="day-tab" onclick="switchDay(2)">DEN 3</div>
</div>

<div class="scroll-area" id="mainScroll">
  <div id="day-0" class="view active"></div>
  <div id="day-1" class="view"></div>
  <div id="day-2" class="view"></div>
  
  <div id="stats-view" class="view"><div class="muscle-label">REKORDY</div><div id="stats-content"></div></div>
  <div id="editor-view" class="view"><div class="muscle-label">EDITOR PLÁNU</div><div id="editor-content"></div></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" id="nav-workout" onclick="switchNav('workout')">
    <i data-lucide="dumbbell" class="nav-icon"></i><div class="nav-label">TRÉNINK</div>
  </div>
  <div class="nav-item" id="nav-stats" onclick="switchNav('stats')">
    <i data-lucide="bar-chart-3" class="nav-icon"></i><div class="nav-label">REKORDY</div>
  </div>
  <div class="nav-item" id="nav-editor" onclick="switchNav('editor')">
    <i data-lucide="settings" class="nav-icon"></i><div class="nav-label">EDITOR</div>
  </div>
  <a href="spotify://" class="nav-item">
    <i data-lucide="music" class="nav-icon"></i><div class="nav-label">SPOTIFY</div>
  </a>
</div>

<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <span style="font-weight: 800; font-size: 20px;">NASTAVIT HODNOTY</span>
      <button onclick="closePicker()" style="color:var(--accent); background:none; border:none; font-weight:800; font-size:16px;">HOTOVO</button>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; text-align:center; color:var(--text3); font-weight:bold; font-size:12px;">
      <div>KG</div><div>OPAKOVÁNÍ</div>
    </div>
    <div class="picker-wheels">
      <div class="picker-highlight"></div>
      <div class="picker-wheel" id="wheelKg" onscroll="snapToCenter(this)"></div>
      <div class="picker-wheel" id="wheelReps" onscroll="snapToCenter(this)"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_PLAN = [
  { id: 0, label: "Den 1: Nohy + Biceps", sections: [
    { label: "BICEPS", exercises: [ { id: 'ex1', name:'Preacher curl', sets:4, reps:'8-10', video:'' }, { id: 'ex2', name:'Hammer curl', sets:3, reps:'10-12', video:'' }, { id: 'ex3', name:'Incline dumbbell curl', sets:3, reps:'10-12', video:'' } ] },
    { label: "NOHY", exercises: [ { id: 'ex4', name:'Leg press', sets:4, reps:'12', video:'' }, { id: 'ex5', name:'Lying leg curl', sets:3, reps:'10-12', video:'' }, { id: 'ex6', name:'Calf raises', sets:3, reps:'20', video:'' } ] }
  ]},
  { id: 1, label: "Den 2: Záda + Ramena", sections: [
    { label: "ZÁDA", exercises: [ { id: 'ex7', name:'Lat pulldown', sets:4, reps:'12', video:'' }, { id: 'ex8', name:'Cable row', sets:4, reps:'10', video:'' }, { id: 'ex9', name:'Hyperextenze', sets:3, reps:'12-15', video:'' } ] },
    { label: "RAMENA", exercises: [ { id: 'ex10', name:'Shoulder press', sets:4, reps:'10', video:'' }, { id: 'ex11', name:'Arnold press', sets:3, reps:'12', video:'' }, { id: 'ex12', name:'Reverse fly', sets:3, reps:'12', video:'' } ] }
  ]},
  { id: 2, label: "Den 3: Hrudník + Triceps", sections: [
    { label: "HRUDNÍK", exercises: [ { id: 'ex13', name:'Bench press', sets:4, reps:'12', video:'' }, { id: 'ex14', name:'Peck deck', sets:3, reps:'10', video:'' }, { id: 'ex15', name:'Incline dumbell press', sets:3, reps:'12-15', video:'' } ] },
    { label: "TRICEPS", exercises: [ { id: 'ex16', name:'Overhead DB extension', sets:3, reps:'10', video:'' }, { id: 'ex17', name:'Dumbbell kickbacks', sets:3, reps:'12', video:'' }, { id: 'ex18', name:'Cable triceps pushdown', sets:4, reps:'12', video:'' } ] }
  ]}
];

let workoutPlan = JSON.parse(localStorage.getItem('ss_plan')) || DEFAULT_PLAN;
let state = JSON.parse(localStorage.getItem('ss_state')) || {};
let prData = JSON.parse(localStorage.getItem('ss_pr')) || {};
let statsCharts = {};

function saveAll() {
    localStorage.setItem('ss_plan', JSON.stringify(workoutPlan));
    localStorage.setItem('ss_state', JSON.stringify(state));
    localStorage.setItem('ss_pr', JSON.stringify(prData));
}

function renderApp() {
  workoutPlan.forEach(day => {
    const container = document.getElementById('day-' + day.id);
    if(!container) return;
    let html = `<div class="muscle-label" style="font-size:24px; color:var(--accent); margin-bottom:20px;">${day.label.toUpperCase()}</div>`;
    day.sections.forEach(sec => {
      html += `<div class="muscle-section"><div class="muscle-label">${sec.label}</div>`;
      sec.exercises.forEach(ex => {
        const pr = prData[ex.id] || '—';
        const hist = state[ex.id]?.history || [];
        const lastWeight = hist.length > 0 ? hist[hist.length-1].maxWeight : '—';
        
        // Přidání ikony videa pokud existuje URL
        const videoBtn = ex.video ? `<a href="${ex.video}" target="_blank" style="color:var(--accent);"><i data-lucide="video" style="width:16px;"></i></a>` : '';

        html += `
          <div id="card-${ex.id}" class="exercise-card">
            <div class="exercise-header" onclick="toggleCard('${ex.id}')">
              <div class="exercise-info">
                <div class="exercise-name">${ex.name} ${videoBtn}</div>
                <div style="font-size:12px; color:var(--text2)">${ex.sets} série / ${ex.reps} reps</div>
              </div>
              <div style="text-align:right">
                <div class="pr-badge"><i data-lucide="trophy" style="width:12px"></i> <span>${pr}</span></div>
                <div class="current-weight">${lastWeight} <span style="font-size:12px; color:var(--text2)">kg</span></div>
              </div>
            </div>
            <div class="exercise-body" id="body-${ex.id}" style="display:none; padding:0 20px 20px; border-top:1px solid var(--border)">
              <div id="rows-${ex.id}" style="margin-top:15px;"></div>
            </div>
          </div>`;
      });
      html += `</div>`;
    });
    html += `<button class="btn-add" onclick="finishWorkout(${day.id})">DOKONČIT TRÉNINK</button>`;
    container.innerHTML = html;
  });
  lucide.createIcons();
}

function buildRows(id) {
  const container = document.getElementById('rows-'+id);
  const ex = workoutPlan.flatMap(d => d.sections).flatMap(s => s.exercises).find(e => e.id === id);
  if (!state[id]) state[id] = { rows: [], history: [] };
  if (state[id].rows.length === 0) state[id].rows = Array.from({length: parseInt(ex.sets)}, () => ({weight: '', reps: '', done: false}));
  
  container.innerHTML = `<div style="display:grid; grid-template-columns:40px 1fr 1fr 40px; font-size:11px; color:var(--text3); margin-bottom:8px; text-align:center;"><span>SET</span><span>KG</span><span>REPS</span><span>OK</span></div>`;
  state[id].rows.forEach((row, i) => {
    const div = document.createElement('div'); div.className = 'series-row';
    div.innerHTML = `
      <span style="text-align:center; color:var(--text2); font-size:14px;">${i+1}</span>
      <div class="series-input" onclick="openPicker('${id}', ${i})">${row.weight || '-'}</div>
      <div class="series-input" onclick="openPicker('${id}', ${i})">${row.reps || '-'}</div>
      <button class="series-done-btn ${row.done?'done':''}" onclick="toggleDone('${id}', ${i})"><i data-lucide="${row.done?'check':'circle'}" style="width:18px"></i></button>`;
    container.appendChild(div);
  });
  lucide.createIcons();
}

// PICKER LOGIC
let activePicker = null;
function populateWheels() {
    const wheelKg = document.getElementById('wheelKg'); const wheelReps = document.getElementById('wheelReps');
    const pad = '<div class="picker-item"></div>';
    let kgHtml = pad; for(let i=0; i<=250; i++) kgHtml += `<div class="picker-item" data-val="${i}">${i}</div>`; wheelKg.innerHTML = kgHtml + pad;
    let repsHtml = pad; for(let i=0; i<=50; i++) repsHtml += `<div class="picker-item" data-val="${i}">${i}</div>`; wheelReps.innerHTML = repsHtml + pad;
}
function openPicker(exId, rowIndex) { activePicker = { exId, rowIndex }; if (!document.getElementById('wheelKg').children.length) populateWheels(); document.getElementById('pickerOverlay').classList.add('open'); }
function closePicker() {
    const getVal = (id) => {
        const w = document.getElementById(id); const items = w.querySelectorAll('.picker-item[data-val]');
        let closest = items[0]; let minDist = Infinity;
        items.forEach(i => { const dist = Math.abs(i.offsetTop + i.offsetHeight/2 - w.scrollTop - w.clientHeight/2); if(dist < minDist) { minDist = dist; closest = i; } });
        return closest.dataset.val;
    };
    state[activePicker.exId].rows[activePicker.rowIndex].weight = getVal('wheelKg');
    state[activePicker.exId].rows[activePicker.rowIndex].reps = getVal('wheelReps');
    saveAll(); buildRows(activePicker.exId); document.getElementById('pickerOverlay').classList.remove('open');
}
function snapToCenter(wheel) { clearTimeout(wheel.t); wheel.t = setTimeout(() => { const items = wheel.querySelectorAll('.picker-item[data-val]'); let closest = items[0]; let minDist = Infinity; items.forEach(i => { const dist = Math.abs(i.offsetTop + i.offsetHeight/2 - wheel.scrollTop - wheel.clientHeight/2); if(dist < minDist) { minDist = dist; closest = i; } }); closest.scrollIntoView({block:'center', behavior:'smooth'}); }, 100); }

function toggleCard(id) {
    const body = document.getElementById('body-'+id); const card = document.getElementById('card-'+id); const isOpen = body.style.display === 'block';
    document.querySelectorAll('.exercise-body').forEach(b => b.style.display = 'none'); document.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('expanded'));
    if(!isOpen) { body.style.display = 'block'; card.classList.add('expanded'); buildRows(id); }
}

function toggleDone(id, idx) { state[id].rows[idx].done = !state[id].rows[idx].done; saveAll(); buildRows(id); }

function finishWorkout(dayId) {
    workoutPlan[dayId].sections.forEach(s => s.exercises.forEach(ex => {
        const sData = state[ex.id];
        if(sData && sData.rows.some(r => r.done)) {
            const max = Math.max(...sData.rows.filter(r => r.done).map(r => parseFloat(r.weight) || 0));
            sData.history.push({ date: new Date().toISOString(), maxWeight: max });
            sData.rows = []; if(max > (prData[ex.id] || 0)) prData[ex.id] = max;
        }
    }));
    saveAll(); renderApp(); showToast("Trénink uložen");
}

function switchNav(tab) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); document.getElementById('nav-'+tab).classList.add('active');
    document.getElementById('mainTabs').style.display = tab === 'workout' ? 'flex' : 'none';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    if(tab === 'workout') { switchDay(0); } else { document.getElementById(tab+'-view').classList.add('active'); if(tab === 'stats') buildStats(); if(tab === 'editor') renderEditor(); }
}

function switchDay(d) {
    document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.day-tab')[d].classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('day-'+d).classList.add('active');
}

// REKORDY
function buildStats() {
    const content = document.getElementById('stats-content');
    let html = '';
    workoutPlan.forEach(d => d.sections.forEach(s => s.exercises.forEach(ex => {
        const pr = prData[ex.id] || '—';
        html += `
        <div class="exercise-card">
            <div class="exercise-header" onclick="toggleStatsGraph('${ex.id}')">
                <div class="exercise-info">
                    <div class="exercise-name">${ex.name}</div>
                    <div style="font-size:10px; color:var(--text3)">${s.label}</div>
                </div>
                <div style="color:var(--accent); font-weight:800; font-size:18px;">${pr} kg</div>
            </div>
            <div id="stats-body-${ex.id}" style="display:none; padding:0 20px 20px; border-top:1px solid var(--border);">
                <div class="graph-container"><canvas id="stats-chart-${ex.id}"></canvas></div>
            </div>
        </div>`;
    })));
    content.innerHTML = html;
}

function toggleStatsGraph(id) {
    const body = document.getElementById('stats-body-'+id);
    const isOpen = body.style.display === 'block';
    document.querySelectorAll('[id^="stats-body-"]').forEach(b => b.style.display = 'none');
    if(!isOpen) { body.style.display = 'block'; renderStatsChart(id); }
}

function renderStatsChart(id) {
    const ctx = document.getElementById('stats-chart-'+id);
    const history = state[id]?.history || [];
    if(history.length < 2) { ctx.parentElement.innerHTML = '<div style="text-align:center; color:var(--text3); font-size:12px; padding:60px 0;">Nedostatek dat pro graf</div>'; return; }
    if(statsCharts[id]) statsCharts[id].destroy();
    statsCharts[id] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: history.map(h => new Date(h.date).toLocaleDateString('cs-CZ', {day:'numeric', month:'numeric'})),
            datasets: [{ data: history.map(h => h.maxWeight), borderColor: '#FFD344', tension: 0.4, fill: false, pointRadius: 2 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#555', font: {size:10} } }, y: { grid: { color: '#222' }, ticks: { color: '#555', font: {size:10} } } } }
    });
}

// EDITOR - OPRAVENÁ A FUNKČNÍ VERZE
function renderEditor() {
    const cont = document.getElementById('editor-content');
    let html = '';
    
    workoutPlan.forEach((day, dIdx) => {
        html += `<div class="muscle-label" style="color:var(--accent); margin-top:10px;">${day.label}</div>`;
        
        day.sections.forEach((sec, sIdx) => {
            html += `<div style="font-size:12px; color:var(--text3); margin-bottom:10px; margin-top:20px; letter-spacing:1px;">${sec.label}</div>`;
            
            sec.exercises.forEach((ex, eIdx) => {
                html += `
                <div class="editor-group">
                    <input type="text" class="edit-input" placeholder="Název cviku" value="${ex.name}" 
                        oninput="updatePlan(${dIdx}, ${sIdx}, ${eIdx}, 'name', this.value)">
                    
                    <div class="edit-row">
                        <input type="text" class="edit-input" placeholder="Série" value="${ex.sets}" 
                            oninput="updatePlan(${dIdx}, ${sIdx}, ${eIdx}, 'sets', this.value)">
                        <input type="text" class="edit-input" placeholder="Opakování" value="${ex.reps}" 
                            oninput="updatePlan(${dIdx}, ${sIdx}, ${eIdx}, 'reps', this.value)">
                    </div>
                    
                    <input type="text" class="edit-input" placeholder="Video URL (YouTube)" value="${ex.video || ''}" 
                        oninput="updatePlan(${dIdx}, ${sIdx}, ${eIdx}, 'video', this.value)">
                </div>`;
            });
        });
    });
    
    html += `<button class="btn-add" onclick="if(confirm('Resetovat vše do továrního nastavení?')){localStorage.clear();location.reload()}" style="background:none; border:1px solid #ff4444; color:#ff4444; margin-bottom:40px;">SMAZAT VEŠKERÁ DATA</button>`;
    cont.innerHTML = html;
}

function updatePlan(dIdx, sIdx, eIdx, field, value) {
    workoutPlan[dIdx].sections[sIdx].exercises[eIdx][field] = value;
    saveAll();
    // Nechceme překreslovat celý editor při každém stisku klávesy (input lag), 
    // ale musíme zajistit že se změny projeví v tréninkovém view
    setTimeout(renderApp, 100); 
}

function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
function setDate() { 
    const n = new Date(); const d = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota']; const m = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince']; 
    document.getElementById('headerDate').innerText = d[n.getDay()] + '\n' + n.getDate() + '. ' + m[n.getMonth()]; 
}

setDate();
renderApp();
</script>
